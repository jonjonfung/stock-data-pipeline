name: Tests

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test imports
        run: |
          python -c "
          import boto3
          import json
          import pandas as pd
          import urllib.request
          print('✅ All imports successful!')
          "

      - name: Test fetch Lambda code
